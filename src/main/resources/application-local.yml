# application-local.yml
spring:
  jpa:
    properties:
      use_sql_comments: true
      hibernate:
        format_sql: true
    hibernate:
      ddl-auto: update
  datasource:
    username: ${LOCAL_DB_USERNAME}
    password: ${LOCAL_DB_PASSWORD}
    url: ${LOCAL_DB_URL}
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: ${LOCAL_REDIS_HOST}
      port: ${LOCAL_REDIS_PORT}

swagger:
  server-url: ${LOCAL_SWAGGER_SERVER_URL}

frontend:
  base-url: ${LOCAL_BASE_URL}
  main-page: ${MAIN_PAGE}
  login-fail-page: ${LOGIN_FAIL_PAGE}
  local-url: ${LOCAL_URL}
  local-secure-url: ${LOCAL_SECURE_URL}

logging:
  level:
    org.hibernate.SQL: debug
    org.hibernate.orm.jdbc.bind: trace