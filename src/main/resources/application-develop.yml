# application-develop.yml
spring:
  jpa:
    hibernate:
      ddl-auto: update
  datasource:
    username: ${DEV_DB_USERNAME}
    password: ${DEV_DB_PASSWORD}
    url: ${DEV_DB_URL}
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: ${DEV_REDIS_HOST}
      port: ${DEV_REDIS_PORT}

swagger:
  server-url: ${DEV_SWAGGER_SERVER_URL}
