services:
  spring-blue:
    image: ghcr.io/teumteumeat/teumteumeat-backend:develop
    container_name: spring-blue
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "8080:8080"
    networks:
      - backend
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./configs:/configs
    env_file:
      - .env
    environment:
      - SPRING_CONFIG_ADDITIONAL-LOCATION=file:/configs/
      - SPRING_PROFILES_ACTIVE=${SPRING_PROFILE:-local}

  spring-green:
    image: ghcr.io/teumteumeat/teumteumeat-backend:develop
    container_name: spring-green
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "8081:8080"
    networks:
      - backend
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./configs:/configs
    env_file:
      - .env
    environment:
      - SPRING_CONFIG_ADDITIONAL-LOCATION=file:/configs/
      - SPRING_PROFILES_ACTIVE=${SPRING_PROFILE:-local}

  nginx:
    image: nginx:stable-alpine
    container_name: nginx
    ports:
      - "80:80"
      - "443:443"
    networks:
      - backend
    volumes:
      - ./configs/nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./configs/certbot/conf:/etc/letsencrypt
      - ./configs/certbot/www:/var/www/certbot
      - ./configs/nginx/service-url.inc:/etc/nginx/conf.d/service-url.inc
    command: '/bin/sh -c ''while :; do sleep 6h & wait $${!}; nginx -s reload; done & nginx -g "daemon off;"'''

  certbot:
    image: certbot/certbot
    container_name: certbot
    volumes:
      - ./configs/certbot/conf:/etc/letsencrypt
      - ./configs/certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot; sleep 12h & wait $${!}; done;'"

  redis:
    image: redis:latest
    container_name: redis
    restart: always
    networks:
      - backend
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli","ping"]
      interval: 5s
      retries: 5
      start_period: 5s
      timeout: 5s

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    volumes:
      - ./configs/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prom_data:/prometheus
    networks:
      - backend

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    depends_on:
      - prometheus
#    user: "$UID:$GID"
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
    networks:
      - backend

volumes:
  redis-data:
  grafana-data:
  prom_data:

networks:
  backend: